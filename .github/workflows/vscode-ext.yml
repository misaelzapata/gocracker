name: vscode-ext

on:
  push:
    paths:
      - 'sandboxes/vscode/**'
  pull_request:
    paths:
      - 'sandboxes/vscode/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandboxes/vscode

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sandboxes/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Package extension
        run: npm run package
