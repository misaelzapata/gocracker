name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same PR so a quick re-push doesn't
# queue up three copies of the suite. Main-branch runs are never
# cancelled (protect the post-merge signal).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit and package tests
        run: go test $(go list ./... | grep -v /tests/integration)
      - name: UDS race + leak gate
        run: make test-uds

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Repo-wide coverage summary
        run: |
          chmod +x ./tools/coverage-repo.sh
          ./tools/coverage-repo.sh --threshold 90 --warn-only --summary-file coverage-summary.txt
      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt

  privileged-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check privileged prerequisites
        id: prereq
        run: |
          if [[ -e /dev/kvm && -e /dev/net/tun ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Free disk space
        if: steps.prereq.outputs.run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
      - name: Decompress guest kernel
        if: steps.prereq.outputs.run == 'true'
        run: gunzip -k artifacts/kernels/gocracker-guest-standard-vmlinux.gz || true
      - name: Build gocracker binary
        if: steps.prereq.outputs.run == 'true'
        run: make build
      - name: Privileged integration tests
        if: steps.prereq.outputs.run == 'true'
        run: |
          sudo -n env GOCRACKER_KERNEL=./artifacts/kernels/gocracker-guest-standard-vmlinux \
            GOCRACKER_SECCOMP=off \
            GOCRACKER_SKIP_MIGRATION=1 \
            GOCRACKER_JAILER_OFF=1 \
            GOCRACKER_SKIP_LARGE_MEM=1 \
            go test -tags integration ./tests/integration/... \
            -coverpkg=github.com/gocracker/gocracker/... \
            -coverprofile=coverage-integration.out \
            -count=1 -v -timeout 600s \
          || sudo -n env GOCRACKER_KERNEL=./artifacts/kernels/gocracker-guest-standard-vmlinux \
            GOCRACKER_SECCOMP=off \
            GOCRACKER_SKIP_MIGRATION=1 \
            go test -tags integration ./tests/integration/... \
            -coverpkg=github.com/gocracker/gocracker/... \
            -coverprofile=coverage-integration.out \
            -count=1 -v -timeout 600s
      - name: Integration coverage summary
        if: steps.prereq.outputs.run == 'true'
        run: |
          sudo chown "$USER" coverage-integration.out 2>/dev/null || true
          go tool cover -func=coverage-integration.out | tail -1 | tee coverage-integration-summary.txt
      - name: Template-bench gate (cache-hit performance, informational)
        if: steps.prereq.outputs.run == 'true'
        # Performance gate — INFORMATIONAL only (continue-on-error:
        # true). Correctness is gated by the `go test -tags integration`
        # step above; this step runs the second-create cache-hit bench
        # and prints timings into the run log for manual review.
        #
        # Why informational: the first CreateTemplate runs a real
        # cold-boot + jailer pivot_root, which fails deterministically
        # on some GitHub hosted runner SKUs with "exec binary not
        # found in jail" (reproduced on commits that only touched
        # docs — Linux mount-namespace semantics on the shared runner
        # kernel, not gocracker logic). The dev-machine reference is
        # ~70 µs; CI runs should land under 10 ms when the runner
        # cooperates, so any real regression still surfaces in the
        # step log.
        continue-on-error: true
        run: |
          # Target: "second create identical-spec == cache hit, < 10 ms".
          # Local dev measures ~70 µs, ~140× under budget.
          go build -o /tmp/template-bench ./sandboxes/cmd/template-bench/
          sudo -n /tmp/template-bench \
            -image alpine:3.20 \
            -kernel "$GITHUB_WORKSPACE/artifacts/kernels/gocracker-guest-standard-vmlinux" \
            -iterations 5 \
            -p95-budget-ms 10
      - name: Pool-bench gate (lease p95 performance, informational)
        if: steps.prereq.outputs.run == 'true'
        # Performance gate — INFORMATIONAL only (continue-on-error:
        # true), same rationale as Template-bench above. Dev-machine
        # p95 is ~17 ms; target on CI is <500 ms (shared runners are
        # ~19× slower on vsock + netlink). Any real regression shows
        # up in the step log; an occasional missing pool-fill boot is
        # not a merge blocker.
        continue-on-error: true
        run: |
          # Absolute kernel path is required: warm-cache snapshot
          # bundling stat()s the kernel at the path stored in the
          # cached RunOptions, and a relative path resolves against
          # the snapshot's temp dir at restore time, not the repo.
          go build -o /tmp/pool-bench ./sandboxes/cmd/pool-bench/
          sudo -n /tmp/pool-bench \
            -burst 6 -warm 6 \
            -timeout-s 300 \
            -p95-budget-ms 500 \
            -image alpine:3.20 \
            -kernel "$GITHUB_WORKSPACE/artifacts/kernels/gocracker-guest-standard-vmlinux"
      - name: Upload integration coverage profile
        if: steps.prereq.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: |
            coverage-integration.out
            coverage-integration-summary.txt
      - name: Skip note
        if: steps.prereq.outputs.run != 'true'
        run: echo "Skipping privileged integration subset because /dev/kvm or /dev/net/tun is unavailable on this runner."
