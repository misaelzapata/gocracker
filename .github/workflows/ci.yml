name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit and package tests
        run: go test $(go list ./... | grep -v /tests/integration)

  privileged-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check privileged prerequisites
        id: prereq
        run: |
          if [[ -e /dev/kvm && -e /dev/net/tun ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Decompress guest kernel
        if: steps.prereq.outputs.run == 'true'
        run: gunzip -k artifacts/kernels/gocracker-guest-standard-vmlinux.gz || true
      - name: Build gocracker binary
        if: steps.prereq.outputs.run == 'true'
        run: make build
      - name: Privileged integration tests
        if: steps.prereq.outputs.run == 'true'
        run: |
          sudo -n env GOCRACKER_KERNEL=./artifacts/kernels/gocracker-guest-standard-vmlinux \
            GOCRACKER_SECCOMP=off \
            go test -tags integration ./tests/integration/... \
            -count=1 -v -timeout 600s
      - name: Retry failed integration tests (CI flakiness)
        if: steps.prereq.outputs.run == 'true' && failure()
        run: |
          echo "Retrying integration tests..."
          sudo -n env GOCRACKER_KERNEL=./artifacts/kernels/gocracker-guest-standard-vmlinux \
            GOCRACKER_SECCOMP=off \
            go test -tags integration ./tests/integration/... \
            -count=1 -v -timeout 600s
      - name: Skip note
        if: steps.prereq.outputs.run != 'true'
        run: echo "Skipping privileged integration subset because /dev/kvm or /dev/net/tun is unavailable on this runner."
