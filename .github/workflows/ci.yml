name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Unit and package tests
        run: go test $(go list ./... | grep -v /tests/integration)
      - name: UDS race + leak gate
        run: make test-uds

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Repo-wide coverage summary
        run: |
          chmod +x ./tools/coverage-repo.sh
          ./tools/coverage-repo.sh --threshold 90 --warn-only --summary-file coverage-summary.txt
      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt

  privileged-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check privileged prerequisites
        id: prereq
        run: |
          if [[ -e /dev/kvm && -e /dev/net/tun ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Free disk space
        if: steps.prereq.outputs.run == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
      - name: Decompress guest kernel
        if: steps.prereq.outputs.run == 'true'
        run: gunzip -k artifacts/kernels/gocracker-guest-standard-vmlinux.gz || true
      - name: Build gocracker binary
        if: steps.prereq.outputs.run == 'true'
        run: make build
      - name: Privileged integration tests
        if: steps.prereq.outputs.run == 'true'
        run: |
          sudo -n env GOCRACKER_KERNEL=./artifacts/kernels/gocracker-guest-standard-vmlinux \
            GOCRACKER_SECCOMP=off \
            GOCRACKER_SKIP_MIGRATION=1 \
            GOCRACKER_JAILER_OFF=1 \
            GOCRACKER_SKIP_LARGE_MEM=1 \
            go test -tags integration ./tests/integration/... \
            -coverpkg=github.com/gocracker/gocracker/... \
            -coverprofile=coverage-integration.out \
            -count=1 -v -timeout 600s \
          || sudo -n env GOCRACKER_KERNEL=./artifacts/kernels/gocracker-guest-standard-vmlinux \
            GOCRACKER_SECCOMP=off \
            GOCRACKER_SKIP_MIGRATION=1 \
            go test -tags integration ./tests/integration/... \
            -coverpkg=github.com/gocracker/gocracker/... \
            -coverprofile=coverage-integration.out \
            -count=1 -v -timeout 600s
      - name: Integration coverage summary
        if: steps.prereq.outputs.run == 'true'
        run: |
          sudo chown "$USER" coverage-integration.out 2>/dev/null || true
          go tool cover -func=coverage-integration.out | tail -1 | tee coverage-integration-summary.txt
      - name: Template-bench gate (Fase 6 §6 step 3)
        if: steps.prereq.outputs.run == 'true'
        run: |
          # Plan §6 target: "Segundo create idéntico: cache hit,
          # < 10 ms". Local dev measures ~70 µs — 140× under budget.
          # CI runner is slower but the cache-hit path has no KVM
          # work (just map lookup + registry add), so even on shared
          # hardware 10 ms should hold with room to spare.
          go build -o /tmp/template-bench ./sandboxes/cmd/template-bench/
          sudo -n /tmp/template-bench \
            -image alpine:3.20 \
            -kernel "$GITHUB_WORKSPACE/artifacts/kernels/gocracker-guest-standard-vmlinux" \
            -iterations 5 \
            -p95-budget-ms 10
      - name: Pool-bench gate (Fase 5 §5 step 6)
        if: steps.prereq.outputs.run == 'true'
        run: |
          # Build the bench binary, then run a steady-state burst-8
          # against an alpine pool. Plan §5 success target is p95
          # < 20 ms on a dev laptop (Ryzen AI 9 HX 370 measures
          # 17 ms). GitHub Actions runners are dramatically slower
          # — empirically 19× on the lease path (vsock + netlink on
          # shared/older hardware), so 17 ms locally surfaces as
          # ~330 ms in CI even with warm-cache restore working
          # correctly. The CI gate uses a 500 ms budget: tight
          # enough to catch a "fell off the cliff" regression
          # (a 1.5+ s p95 means warm-cache fell off and we're
          # cold-booting; a 700+ ms p95 means SetNetwork is slow-
          # path), loose enough to absorb runner noise. Local dev
          # should keep using the 20 ms target via `make pool-bench-local`.
          #
          # Absolute kernel path is required: warm-cache snapshot
          # bundling stat()s the kernel at the path stored in the
          # cached RunOptions, and a relative path resolves against
          # the snapshot's temp dir at restore time, not the repo.
          go build -o /tmp/pool-bench ./sandboxes/cmd/pool-bench/
          sudo -n /tmp/pool-bench \
            -burst 8 -warm 8 \
            -timeout-s 300 \
            -p95-budget-ms 500 \
            -image alpine:3.20 \
            -kernel "$GITHUB_WORKSPACE/artifacts/kernels/gocracker-guest-standard-vmlinux"
      - name: Upload integration coverage profile
        if: steps.prereq.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: |
            coverage-integration.out
            coverage-integration-summary.txt
      - name: Skip note
        if: steps.prereq.outputs.run != 'true'
        run: echo "Skipping privileged integration subset because /dev/kvm or /dev/net/tun is unavailable on this runner."
