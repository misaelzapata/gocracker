version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/"]
      interval: 1s
      timeout: 2s
      retries: 5
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    depends_on:
      web:
        condition: service_healthy
